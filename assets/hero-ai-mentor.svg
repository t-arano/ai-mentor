<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" role="img" aria-labelledby="title desc">
  <title id="title">AIメンターのサポートイメージ</title>
  <desc id="desc">AI相談、業務整理、ツール化支援を表すダッシュボード風のイラスト</desc>
  <defs>
    <linearGradient id="bg" x1="98" y1="42" x2="662" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F1FE"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="blue" x1="166" y1="128" x2="612" y2="432" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A73E8"/>
      <stop offset="1" stop-color="#00B8D4"/>
    </linearGradient>
    <filter id="shadow" x="55" y="48" width="650" height="468" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0B4EB0" flood-opacity=".18"/>
    </filter>
    <filter id="soft" x="0" y="0" width="760" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1A73E8" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="760" height="560" fill="none"/>
  <circle cx="118" cy="106" r="68" fill="#FFD24D" opacity=".22"/>
  <circle cx="665" cy="122" r="72" fill="#00B8D4" opacity=".18"/>
  <circle cx="636" cy="462" r="90" fill="#1A73E8" opacity=".10"/>

  <g filter="url(#shadow)">
    <rect x="86" y="74" width="588" height="408" rx="36" fill="url(#bg)"/>
    <rect x="86" y="74" width="588" height="78" rx="36" fill="#FFFFFF"/>
    <rect x="86" y="116" width="588" height="36" fill="#FFFFFF"/>
    <circle cx="132" cy="113" r="8" fill="#FF6B6B"/>
    <circle cx="160" cy="113" r="8" fill="#FFD24D"/>
    <circle cx="188" cy="113" r="8" fill="#37D67A"/>
    <rect x="238" y="101" width="250" height="24" rx="12" fill="#E8F1FE"/>
  </g>

  <g filter="url(#soft)">
    <rect x="126" y="190" width="244" height="74" rx="20" fill="#FFFFFF"/>
    <text x="154" y="221" fill="#5B6B7B" font-family="Arial, sans-serif" font-size="17" font-weight="700">業務でAIを使いたい</text>
    <text x="154" y="247" fill="#8A98A8" font-family="Arial, sans-serif" font-size="14">でも何から始めれば…？</text>

    <rect x="390" y="202" width="244" height="92" rx="22" fill="#E8F1FE"/>
    <text x="420" y="234" fill="#0B4EB0" font-family="Arial, sans-serif" font-size="17" font-weight="700">AIメンターが伴走</text>
    <text x="420" y="262" fill="#1A73E8" font-family="Arial, sans-serif" font-size="14" font-weight="700">業務に合わせて活用方法を提案</text>
  </g>

  <g>
    <path d="M370 235 C385 228 397 227 410 236" fill="none" stroke="#1A73E8" stroke-width="5" stroke-linecap="round" opacity=".45"/>
    <path d="M404 221 L422 238 L400 247" fill="none" stroke="#1A73E8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".45"/>
  </g>

  <g transform="translate(250 308)" filter="url(#soft)">
    <rect x="0" y="0" width="260" height="120" rx="28" fill="url(#blue)"/>
    <circle cx="78" cy="60" r="38" fill="#FFFFFF" opacity=".18"/>
    <rect x="52" y="40" width="52" height="42" rx="14" fill="#FFFFFF"/>
    <circle cx="69" cy="58" r="5" fill="#1A73E8"/>
    <circle cx="87" cy="58" r="5" fill="#1A73E8"/>
    <path d="M68 73 Q78 80 88 73" fill="none" stroke="#1A73E8" stroke-width="4" stroke-linecap="round"/>
    <path d="M78 33 V22" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <circle cx="78" cy="17" r="7" fill="#FFD24D"/>
    <text x="126" y="52" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="800">AI Mentor</text>
    <text x="126" y="81" fill="#D9F7FF" font-family="Arial, sans-serif" font-size="15" font-weight="700">相談からツール化まで</text>
  </g>

  <g filter="url(#soft)">
    <rect x="122" y="348" width="98" height="86" rx="20" fill="#FFFFFF"/>
    <text x="171" y="382" text-anchor="middle" font-size="25">💬</text>
    <text x="171" y="413" text-anchor="middle" fill="#1C2733" font-family="Arial, sans-serif" font-size="14" font-weight="800">相談</text>

    <rect x="532" y="330" width="104" height="90" rx="20" fill="#FFFFFF"/>
    <text x="584" y="366" text-anchor="middle" font-size="25">⚙️</text>
    <text x="584" y="397" text-anchor="middle" fill="#1C2733" font-family="Arial, sans-serif" font-size="14" font-weight="800">仕組み化</text>
  </g>

  <path d="M220 390 C236 388 239 368 250 366" fill="none" stroke="#00B8D4" stroke-width="5" stroke-linecap="round" opacity=".45"/>
  <path d="M510 366 C526 362 525 356 532 352" fill="none" stroke="#00B8D4" stroke-width="5" stroke-linecap="round" opacity=".45"/>
</svg>
